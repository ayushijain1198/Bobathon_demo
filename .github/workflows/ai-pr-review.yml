name: AI-Powered PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **/*.java
            **/*.xml
            **/*.properties
            **/*.yaml
            **/*.yml

      - name: Analyze code changes
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "## 🤖 AI Code Review" > ai_review.md
          echo "" >> ai_review.md
          echo "### 📝 Changed Files" >> ai_review.md
          echo "" >> ai_review.md
          
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "- \`$file\`" >> ai_review.md
          done
          
          echo "" >> ai_review.md
          echo "### 🔍 Detailed Analysis" >> ai_review.md
          echo "" >> ai_review.md
          
          # Analyze Java files
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ $file == *.java ]]; then
              echo "#### 📄 \`$file\`" >> ai_review.md
              echo "" >> ai_review.md
              
              # Check for common patterns
              if grep -q "RuntimeException" "$file"; then
                echo "- ⚠️ **Generic Exception**: Consider using custom exceptions instead of RuntimeException" >> ai_review.md
              fi
              
              if grep -q "System.out.println" "$file"; then
                echo "- ⚠️ **Logging**: Replace System.out.println with proper logging (SLF4J/Logback)" >> ai_review.md
              fi
              
              if grep -q "@Autowired" "$file"; then
                echo "- 💡 **Constructor Injection**: Consider using constructor injection instead of @Autowired" >> ai_review.md
              fi
              
              if grep -q "public class.*Controller" "$file"; then
                if ! grep -q "@Valid" "$file"; then
                  echo "- 💡 **Validation**: Consider adding @Valid annotation for request body validation" >> ai_review.md
                fi
                if ! grep -q "ResponseEntity" "$file"; then
                  echo "- 💡 **Response Handling**: Consider using ResponseEntity for better HTTP response control" >> ai_review.md
                fi
              fi
              
              if grep -q "public class.*Service" "$file"; then
                if ! grep -q "@Transactional" "$file"; then
                  echo "- 💡 **Transaction Management**: Consider adding @Transactional where appropriate" >> ai_review.md
                fi
              fi
              
              # Check for missing JavaDoc
              if ! grep -q "/\*\*" "$file"; then
                echo "- 📚 **Documentation**: Add JavaDoc comments for public methods and classes" >> ai_review.md
              fi
              
              echo "" >> ai_review.md
            fi
          done
          
          echo "### 🎯 General Recommendations" >> ai_review.md
          echo "" >> ai_review.md
          echo "#### Architecture & Design" >> ai_review.md
          echo "- ✅ Use DTOs (Data Transfer Objects) to separate API contracts from domain models" >> ai_review.md
          echo "- ✅ Implement proper exception handling with @ControllerAdvice" >> ai_review.md
          echo "- ✅ Add API versioning strategy (URL or header-based)" >> ai_review.md
          echo "- ✅ Consider implementing HATEOAS for RESTful maturity" >> ai_review.md
          echo "" >> ai_review.md
          
          echo "#### Security" >> ai_review.md
          echo "- 🔒 Add Spring Security for authentication/authorization" >> ai_review.md
          echo "- 🔒 Implement JWT token-based authentication" >> ai_review.md
          echo "- 🔒 Add input validation and sanitization" >> ai_review.md
          echo "- 🔒 Configure CORS properly for production" >> ai_review.md
          echo "- 🔒 Use HTTPS in production" >> ai_review.md
          echo "" >> ai_review.md
          
          echo "#### Performance" >> ai_review.md
          echo "- ⚡ Add pagination for list endpoints (Page, Pageable)" >> ai_review.md
          echo "- ⚡ Implement caching with @Cacheable where appropriate" >> ai_review.md
          echo "- ⚡ Add database indexes for frequently queried columns" >> ai_review.md
          echo "- ⚡ Use lazy loading for entity relationships" >> ai_review.md
          echo "- ⚡ Consider using database connection pooling (HikariCP)" >> ai_review.md
          echo "" >> ai_review.md
          
          echo "#### Testing" >> ai_review.md
          echo "- 🧪 Add unit tests for services (JUnit 5 + Mockito)" >> ai_review.md
          echo "- 🧪 Add integration tests for repositories (@DataJpaTest)" >> ai_review.md
          echo "- 🧪 Add API tests for controllers (@WebMvcTest)" >> ai_review.md
          echo "- 🧪 Add end-to-end tests (@SpringBootTest)" >> ai_review.md
          echo "- 🧪 Aim for minimum 80% code coverage" >> ai_review.md
          echo "" >> ai_review.md
          
          echo "#### Observability" >> ai_review.md
          echo "- 📊 Add Spring Boot Actuator for health checks" >> ai_review.md
          echo "- 📊 Implement structured logging with correlation IDs" >> ai_review.md
          echo "- 📊 Add metrics collection (Micrometer)" >> ai_review.md
          echo "- 📊 Consider distributed tracing (Sleuth/Zipkin)" >> ai_review.md
          echo "" >> ai_review.md
          
          echo "#### Documentation" >> ai_review.md
          echo "- 📖 Add Swagger/OpenAPI UI integration" >> ai_review.md
          echo "- 📖 Document API rate limits and quotas" >> ai_review.md
          echo "- 📖 Add example requests/responses" >> ai_review.md
          echo "- 📖 Document error codes and messages" >> ai_review.md
          echo "" >> ai_review.md
          
          echo "---" >> ai_review.md
          echo "*🤖 This review was automatically generated. Please review suggestions and apply what's relevant for your project.*" >> ai_review.md
          echo "" >> ai_review.md
          echo "**Need help?** Feel free to ask questions in the PR comments!" >> ai_review.md

      - name: Post AI review comment
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('ai_review.md', 'utf8');
            
            // Check if we already commented
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🤖 AI Code Review')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

# Made with Bob
