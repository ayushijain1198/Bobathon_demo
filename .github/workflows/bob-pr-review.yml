name: Bob PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  bob-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bob
        shell: bash
        run: |
          curl -s https://s3.us-south.cloud-object-storage.appdomain.cloud/bobshell/install-bobshell.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/bin" >> $GITHUB_PATH
          which bob || true
          bob --version || true

      - name: Verify Bob
        shell: bash
        run: |
          command -v bob || (echo "Bob not found after install" && exit 1)
          bob --version

      - name: Get PR diff
        shell: bash
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1

          git diff -U5 "origin/${{ github.event.pull_request.base.ref }}...HEAD" \
            -- . \
            ':(exclude).github/workflows/**' \
            ':(exclude)README.md' > pr_diff.txt

          if [ ! -s pr_diff.txt ]; then
            echo "No code diff to review." > pr_diff.txt
          fi

      - name: Prepare Bob input
        shell: bash
        run: |
          cp .github/bob/pr-review-prompt.txt bob_input.txt
          echo "" >> bob_input.txt
          echo "PR Diff:" >> bob_input.txt
          cat pr_diff.txt >> bob_input.txt

      - name: Run Bob review
        shell: bash
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOB_API_KEY }}
        run: |
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY not set"
            exit 1
          fi

          PROMPT="$(cat bob_input.txt)"
          bob --yolo --prompt "$PROMPT" > bob_raw.md

      - name: Extract final review
        shell: bash
        run: |
          awk '/^===FINAL_REVIEW===/{flag=1; next} flag' bob_raw.md > bob_extracted.md

          if grep -q "^No significant issues found\.$" bob_extracted.md; then
            echo "No significant issues found." > bob_review.md
          else
            sed 's/\[using tool attempt_completion:.*$//' bob_extracted.md \
              | sed 's/\[Successfully completed.*$//' \
              | sed 's/---output---.*$//' \
              | sed 's/[[:space:]]*$//' \
              | awk 'NF' \
              | awk '!seen[$0]++' > bob_review.md
          fi

          if [ ! -s bob_review.md ]; then
            echo "No significant issues found." > bob_review.md
          fi

      - name: Post PR comment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file bob_review.md