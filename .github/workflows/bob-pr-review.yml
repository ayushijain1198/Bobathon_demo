name: Bob PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  bob-review:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load Node (nvm)
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 22
          which bob
          bob --version

      - name: Get PR diff
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          git diff -U5 "origin/${{ github.event.pull_request.base.ref }}...HEAD" > pr_diff.txt

      - name: Prepare Bob input
        run: |
          cp .github/bob/pr-review-prompt.txt bob_input.txt
          echo "" >> bob_input.txt
          echo "PR Diff:" >> bob_input.txt
          cat pr_diff.txt >> bob_input.txt

      - name: Run Bob review
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOB_API_KEY }}
        run: |
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY not set"
            exit 1
          fi

          PROMPT="$(cat bob_input.txt)"
          bob --yolo --prompt "$PROMPT" > bob_raw.md

      - name: Extract final review
        run: |
          awk '/^===FINAL_REVIEW===/{flag=1; next} flag' bob_raw.md > bob_extracted.md

          if grep -q "^No significant issues found\.$" bob_extracted.md; then
            echo "No significant issues found." > bob_review.md
          else
            grep '^- ' bob_extracted.md \
              | sed 's/\[using tool attempt_completion:.*$//' \
              | sed 's/[[:space:]]*$//' \
              | awk '!seen[$0]++' > bob_review.md || true
          fi

          if [ ! -s bob_review.md ]; then
            echo "No significant issues found." > bob_review.md
          fi

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file bob_review.md \
            --edit-last \
            --create-if-none