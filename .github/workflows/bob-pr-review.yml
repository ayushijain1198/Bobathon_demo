name: Bob PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  bob-review:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...HEAD" > changed_files.txt
          cat changed_files.txt

      - name: Prepare Bob input
        run: |
          cp .github/bob/pr-review-prompt.txt bob_input.txt
          echo "" >> bob_input.txt
          echo "Changed files:" >> bob_input.txt
          cat changed_files.txt >> bob_input.txt

      - name: Run Bob review
        env:
          BOB_API_KEY: ${{ secrets.BOB_API_KEY }}
        run: |
          # Ensure Bob is authenticated
          if [ -z "$BOB_API_KEY" ]; then
            echo "Error: BOB_API_KEY secret is not set" >&2
            echo "Please add BOB_API_KEY to your repository secrets" >&2
            exit 1
          fi
          
          # Run Bob review
          bob < bob_input.txt > bob_review.md || echo "Bob review failed, but continuing..." > bob_review.md

      - name: Ensure output exists
        run: |
          test -f bob_review.md || echo "No significant issues found." > bob_review.md

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file bob_review.md \
            --edit-last \
            --create-if-none
