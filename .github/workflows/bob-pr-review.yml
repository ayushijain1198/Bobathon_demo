name: Bob PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  bob-review:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...HEAD" > changed_files.txt
          cat changed_files.txt

      - name: Prepare Bob input
        run: |
          cp .github/bob/pr-review-prompt.txt bob_input.txt
          echo "" >> bob_input.txt
          echo "Changed files:" >> bob_input.txt
          cat changed_files.txt >> bob_input.txt

      # ⚠️ IMPORTANT if using nvm (your case)
      - name: Load Node (nvm)
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 22
          which bob
          bob --version

      - name: Run Bob review
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOB_API_KEY }}
        run: |
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY not set"
            exit 1
          fi

          PROMPT="$(cat bob_input.txt)"

          echo "Running Bob..."
          bob --yolo --prompt "$PROMPT" > bob_review.md

      - name: Ensure output exists
        run: |
          test -f bob_review.md || echo "No issues found." > bob_review.md

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file bob_review.md \
            --edit-last \
            --create-if-none