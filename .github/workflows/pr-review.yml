name: Automated PR Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        run: |
          ./mvnw clean compile -DskipTests
          
      - name: Run code quality checks
        id: quality_check
        run: |
          echo "## Code Review Findings" > review_comment.md
          echo "" >> review_comment.md
          
          # Check for common issues
          echo "### 🔍 Analysis Results" >> review_comment.md
          echo "" >> review_comment.md
          
          # Check for TODO comments
          TODO_COUNT=$(find src -name "*.java" -type f -exec grep -l "TODO" {} \; | wc -l)
          if [ $TODO_COUNT -gt 0 ]; then
            echo "- ⚠️ Found $TODO_COUNT file(s) with TODO comments" >> review_comment.md
          fi
          
          # Check for System.out.println (should use logger)
          SYSOUT_COUNT=$(find src/main -name "*.java" -type f -exec grep -l "System.out.println" {} \; | wc -l)
          if [ $SYSOUT_COUNT -gt 0 ]; then
            echo "- ⚠️ Found $SYSOUT_COUNT file(s) using System.out.println (consider using a logger)" >> review_comment.md
          fi
          
          # Check for printStackTrace
          STACKTRACE_COUNT=$(find src/main -name "*.java" -type f -exec grep -l "printStackTrace" {} \; | wc -l)
          if [ $STACKTRACE_COUNT -gt 0 ]; then
            echo "- ⚠️ Found $STACKTRACE_COUNT file(s) using printStackTrace (use proper logging)" >> review_comment.md
          fi
          
          echo "" >> review_comment.md
          echo "### 💡 Improvement Suggestions" >> review_comment.md
          echo "" >> review_comment.md
          
          # General suggestions
          echo "#### Code Quality" >> review_comment.md
          echo "- Consider adding input validation in controllers" >> review_comment.md
          echo "- Add proper exception handling with custom exceptions" >> review_comment.md
          echo "- Consider adding unit tests for services and repositories" >> review_comment.md
          echo "- Add JavaDoc comments for public methods" >> review_comment.md
          echo "" >> review_comment.md
          
          echo "#### Security" >> review_comment.md
          echo "- Add authentication and authorization (Spring Security)" >> review_comment.md
          echo "- Implement rate limiting for APIs" >> review_comment.md
          echo "- Add input sanitization to prevent SQL injection" >> review_comment.md
          echo "- Consider adding CORS configuration" >> review_comment.md
          echo "" >> review_comment.md
          
          echo "#### Performance" >> review_comment.md
          echo "- Add pagination for list endpoints" >> review_comment.md
          echo "- Consider adding caching for frequently accessed data" >> review_comment.md
          echo "- Add database indexes for frequently queried fields" >> review_comment.md
          echo "" >> review_comment.md
          
          echo "#### Best Practices" >> review_comment.md
          echo "- Use DTOs instead of exposing entities directly" >> review_comment.md
          echo "- Add API versioning (e.g., /api/v1/books)" >> review_comment.md
          echo "- Implement proper error responses with standard format" >> review_comment.md
          echo "- Add request/response logging" >> review_comment.md
          echo "- Consider adding OpenAPI/Swagger UI integration" >> review_comment.md
          echo "" >> review_comment.md
          
          echo "#### Testing" >> review_comment.md
          echo "- Add unit tests with JUnit 5 and Mockito" >> review_comment.md
          echo "- Add integration tests with @SpringBootTest" >> review_comment.md
          echo "- Add API tests with MockMvc or RestAssured" >> review_comment.md
          echo "- Aim for at least 80% code coverage" >> review_comment.md
          echo "" >> review_comment.md
          
          echo "---" >> review_comment.md
          echo "*This is an automated review. Please review the suggestions and apply what makes sense for your use case.*" >> review_comment.md

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('review_comment.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

